name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match git tag ($TAG_VERSION). Bump package.json before tagging."
            exit 1
          fi
          echo "Version match OK: $PKG_VERSION"

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install mcp-publisher
        run: |
          curl -L -o /tmp/mcp-publisher.tar.gz \
            "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz"
          tar -xzf /tmp/mcp-publisher.tar.gz -C /tmp/
          sudo mv /tmp/mcp-publisher /usr/local/bin/mcp-publisher
          mcp-publisher --help | head -3

      - name: Publish to Official MCP Registry via OIDC
        run: |
          mcp-publisher login github-oidc
          mcp-publisher publish
